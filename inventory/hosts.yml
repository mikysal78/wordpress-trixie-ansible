---
# Inventario: il CT Debian Trixie su Proxmox.
# Sostituisci ansible_host con l'IP del container.
all:
  children:
    wordpress:
      hosts:
        wp01:
          ansible_host: 192.0.2.10        # <-- IP del CT
      vars:
        ansible_user: root                # utente iniziale (vedi README per bootstrap)
        ansible_port: 22                  # cambialo se hardening_ssh_port != 22
        ansible_python_interpreter: /usr/bin/python3
