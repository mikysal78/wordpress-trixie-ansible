[defaults]
inventory            = inventory/hosts.yml
# Ruoli esterni (Galaxy) installati in galaxy_roles/ (ignorata da git);
# i ruoli locali del progetto restano in roles/.
roles_path           = galaxy_roles:roles
# Collections installate localmente in collections/ (ignorata da git).
collections_path     = collections
host_key_checking    = True
retry_files_enabled  = False
stdout_callback      = ansible.builtin.default
callback_result_format = yaml
callbacks_enabled    = profile_tasks, timer
interpreter_python   = auto_silent
forks                = 10
nocows               = True
# Decommenta se usi un file per la password del vault:
# vault_password_file = .vault_pass

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
become_ask_pass = False

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
