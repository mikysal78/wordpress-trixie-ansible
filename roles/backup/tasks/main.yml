---
- name: Crea la directory dei backup
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Installa lo script di backup
  ansible.builtin.template:
    src: wp-backup.sh.j2
    dest: "{{ backup_script_path }}"
    owner: root
    group: root
    mode: "0750"

- name: Crea il file di credenziali per i dump (solo root)
  ansible.builtin.copy:
    dest: /root/.wp-backup.cnf
    owner: root
    group: root
    mode: "0600"
    content: |
      [client]
      user=root
      password={{ mysql_root_password }}
  no_log: true

- name: Pianifica il backup giornaliero (cron)
  ansible.builtin.cron:
    name: "wordpress-backup"
    user: root
    minute: "{{ backup_cron_minute }}"
    hour: "{{ backup_cron_hour }}"
    job: "{{ backup_script_path }} >> /var/log/wp-backup.log 2>&1"
