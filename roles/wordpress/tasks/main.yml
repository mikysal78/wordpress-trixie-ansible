---
- name: Installa WP-CLI
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
    dest: "{{ wordpress_cli_path }}"
    mode: "0755"
    force: false

- name: Scarica il core di WordPress
  ansible.builtin.command: >
    {{ wordpress_cli_path }} core download --locale={{ wp_locale }} --path={{ wp_root }}
  args:
    creates: "{{ wp_root }}/wp-load.php"
  become: true
  become_user: www-data

- name: Genera wp-config.php
  ansible.builtin.command: >
    {{ wordpress_cli_path }} config create
    --path={{ wp_root }}
    --dbname={{ db_name }}
    --dbuser={{ db_user }}
    --dbpass={{ db_password }}
    --dbhost={{ db_host }}
    --dbprefix={{ db_table_prefix }}
    --locale={{ wp_locale }}
    --skip-check
  args:
    creates: "{{ wp_root }}/wp-config.php"
  become: true
  become_user: www-data
  no_log: true

- name: Installa WordPress (crea admin e DB schema)
  ansible.builtin.command: >
    {{ wordpress_cli_path }} core install
    --path={{ wp_root }}
    --url={{ wordpress_url }}
    --title="{{ wp_site_title }}"
    --admin_user={{ wp_admin_user }}
    --admin_password={{ wp_admin_password }}
    --admin_email={{ wp_admin_email }}
    --skip-email
  register: wordpress_install
  changed_when: "'already installed' not in wordpress_install.stderr"
  failed_when:
    - wordpress_install.rc != 0
    - "'already installed' not in wordpress_install.stderr"
  become: true
  become_user: www-data
  no_log: true

# ---------- Hardening WordPress ----------
- name: Imposta le chiavi di sicurezza (salts)
  ansible.builtin.command: "{{ wordpress_cli_path }} config shuffle-salts --path={{ wp_root }}"
  become: true
  become_user: www-data
  changed_when: true

- name: Disabilita l'editor di file dalla dashboard
  ansible.builtin.command: "{{ wordpress_cli_path }} config set DISALLOW_FILE_EDIT true --raw --path={{ wp_root }}"
  become: true
  become_user: www-data
  changed_when: true

- name: Forza aggiornamenti automatici minor + sicurezza
  ansible.builtin.command: "{{ wordpress_cli_path }} config set WP_AUTO_UPDATE_CORE minor --path={{ wp_root }}"
  become: true
  become_user: www-data
  changed_when: true

# ---------- Redis object cache ----------
- name: Configura le costanti Redis in wp-config
  ansible.builtin.command: "{{ wordpress_cli_path }} config set {{ item.k }} {{ item.v }} {{ item.raw | default('') }} --path={{ wp_root }}"
  loop:
    - { k: "WP_REDIS_HOST", v: "127.0.0.1" }
    - { k: "WP_REDIS_PORT", v: "6379", raw: "--raw" }
    - { k: "WP_CACHE", v: "true", raw: "--raw" }
  become: true
  become_user: www-data
  changed_when: true
  when: enable_redis | bool

- name: Installa e attiva il plugin redis-cache
  ansible.builtin.command: "{{ wordpress_cli_path }} plugin install redis-cache --activate --path={{ wp_root }}"
  register: wordpress_redis_plugin
  changed_when: "'Plugin already installed' not in wordpress_redis_plugin.stdout"
  failed_when:
    - wordpress_redis_plugin.rc != 0
    - "'already installed' not in wordpress_redis_plugin.stdout"
  become: true
  become_user: www-data
  when: enable_redis | bool

- name: Abilita l'object cache Redis (drop-in)
  ansible.builtin.command: "{{ wordpress_cli_path }} redis enable --path={{ wp_root }}"
  register: wordpress_redis_enable
  changed_when: "'already enabled' not in wordpress_redis_enable.stdout"
  failed_when:
    - wordpress_redis_enable.rc != 0
    - "'already enabled' not in wordpress_redis_enable.stdout"
  become: true
  become_user: www-data
  when: enable_redis | bool

# ---------- Permessi ----------
- name: Proprietario corretto su tutti i file
  ansible.builtin.file:
    path: "{{ wp_root }}"
    owner: www-data
    group: www-data
    recurse: true

- name: Permessi sicuri sulle directory (755)
  ansible.builtin.command: find {{ wp_root }} -type d -exec chmod 755 {} +
  changed_when: false

- name: Permessi sicuri sui file (644)
  ansible.builtin.command: find {{ wp_root }} -type f -exec chmod 644 {} +
  changed_when: false

- name: Permessi ristretti su wp-config.php (640)
  ansible.builtin.file:
    path: "{{ wp_root }}/wp-config.php"
    mode: "0640"
    owner: www-data
    group: www-data
