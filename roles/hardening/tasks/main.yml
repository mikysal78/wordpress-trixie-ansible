---
- name: Installa i pacchetti di hardening
  ansible.builtin.apt:
    name: "{{ hardening_packages }}"
    state: present

# ---------- Utente amministratore sudo ----------
- name: Crea l'utente amministratore sudo
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: sudo
    shell: /bin/bash
    create_home: true
    password: "{{ admin_user_password | password_hash('sha512') if admin_user_password | length > 0 else omit }}"
  when: admin_user | length > 0

- name: Installa la chiave pubblica SSH dell'amministratore
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    key: "{{ admin_ssh_pubkey }}"
    state: present
  when:
    - admin_user | length > 0
    - admin_ssh_pubkey | length > 0

- name: Consenti sudo senza password all'admin (solo se accesso a chiave)
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ admin_user }}"
    content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"
  when:
    - admin_user | length > 0
    - admin_ssh_pubkey | length > 0

# ---------- SSH hardening ----------
- name: Configura SSH (drop-in, stile Trixie)
  ansible.builtin.template:
    src: 99-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    mode: "0644"
    validate: "sshd -t -f %s"
  notify: Restart ssh

# ---------- sysctl (Trixie: solo /etc/sysctl.d/, best-effort in LXC) ----------
- name: Applica parametri sysctl di sicurezza
  ansible.builtin.template:
    src: 99-hardening-sysctl.conf.j2
    dest: /etc/sysctl.d/99-hardening.conf
    mode: "0644"
  notify: Reload sysctl

- name: Carica i sysctl (ignora i parametri non scrivibili in LXC unprivileged)
  ansible.builtin.command: sysctl --system
  changed_when: false
  failed_when: false

# ---------- Firewall UFW ----------
- name: UFW - policy di default deny in ingresso
  community.general.ufw:
    direction: incoming
    policy: deny

- name: UFW - policy di default allow in uscita
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: UFW - consenti SSH
  community.general.ufw:
    rule: limit
    port: "{{ hardening_ssh_port }}"
    proto: tcp

- name: UFW - consenti HTTP/HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"

- name: UFW - porte extra
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_extra_tcp_ports }}"
  when: firewall_extra_tcp_ports | length > 0

- name: UFW - abilita il firewall
  community.general.ufw:
    state: enabled
    logging: "on"
  failed_when: false   # in alcuni LXC unprivileged il logging kernel non è settabile

# ---------- fail2ban ----------
- name: Configura jail fail2ban per sshd
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: Restart fail2ban

- name: Abilita e avvia fail2ban
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started

# ---------- Aggiornamenti automatici di sicurezza ----------
- name: Abilita unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
