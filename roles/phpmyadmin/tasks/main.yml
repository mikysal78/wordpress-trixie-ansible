---
- name: Pacchetti necessari (htpasswd + passlib per il modulo)
  ansible.builtin.apt:
    name:
      - apache2-utils
      - python3-passlib
    state: present
  when: phpmyadmin_basic_auth | bool

- name: Scarica phpMyAdmin {{ phpmyadmin_version }}
  ansible.builtin.get_url:
    url: "{{ phpmyadmin_download_url }}"
    dest: "/tmp/phpmyadmin-{{ phpmyadmin_version }}.tar.gz"
    mode: "0644"

- name: Crea la directory di installazione
  ansible.builtin.file:
    path: "{{ phpmyadmin_install_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Estrai phpMyAdmin
  ansible.builtin.unarchive:
    src: "/tmp/phpmyadmin-{{ phpmyadmin_version }}.tar.gz"
    dest: "{{ phpmyadmin_install_dir }}"
    remote_src: true
    extra_opts: [--strip-components=1]
    owner: www-data
    group: www-data
    creates: "{{ phpmyadmin_install_dir }}/index.php"

- name: Crea la tmp dir di phpMyAdmin
  ansible.builtin.file:
    path: "{{ phpmyadmin_tmp_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0700"

# --- blowfish secret persistente (fuori dalla webroot) ---
- name: Verifica se il blowfish secret esiste gia'
  ansible.builtin.stat:
    path: "{{ phpmyadmin_blowfish_file }}"
  register: phpmyadmin_blowfish_stat

- name: Genera il blowfish secret una sola volta
  ansible.builtin.copy:
    dest: "{{ phpmyadmin_blowfish_file }}"
    content: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    owner: www-data
    group: www-data
    mode: "0600"
  when: not phpmyadmin_blowfish_stat.stat.exists
  no_log: true

- name: Leggi il blowfish secret persistente
  ansible.builtin.slurp:
    src: "{{ phpmyadmin_blowfish_file }}"
  register: phpmyadmin_blowfish_data
  no_log: true

- name: Genera config.inc.php
  ansible.builtin.template:
    src: config.inc.php.j2
    dest: "{{ phpmyadmin_install_dir }}/config.inc.php"
    owner: www-data
    group: www-data
    mode: "0640"
  vars:
    phpmyadmin_blowfish: "{{ phpmyadmin_blowfish_data.content | b64decode | trim }}"

- name: Crea il file Basic Auth davanti a phpMyAdmin
  community.general.htpasswd:
    path: /etc/nginx/.htpasswd-pma
    name: "{{ phpmyadmin_basic_user }}"
    password: "{{ phpmyadmin_basic_password }}"
    owner: root
    group: www-data
    mode: "0640"
  when: phpmyadmin_basic_auth | bool
  no_log: true
